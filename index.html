<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Реєстрація на конференцію</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
    <div class="progress-bar"><div id="progress"></div></div>
    <form id="form">
        <div class="step" id="step1">
            <h3>Контактна інформація</h3>
            <input type="text" id="fullname" placeholder="ПІБ (повністю для сертифіката)" required>
            <input type="tel" id="phone" placeholder="Номер телефону в форматі +380ХХХХХХХХ" required>
            <input type="text" id="telegram" placeholder="Нікнейм в телеграмі в форматі @MarkGrayson" required>
            <input type="email" id="email" placeholder="Email (для квитка)" required>
            <button type="button" onclick="secondStep()">Далі ➔</button>
        </div>

        <div class="step" id="step2" style="display:none;">
        	<h3> Особиста інформація </h3>

			<input type="text" id="city" placeholder="З якого ви міста?" required>

        	<select id="age" required>
                <option value="" disabled selected>Ваш вік</option>
                <option>менше 25</option>
                <option>25–30 років</option>
                <option>31–35 років</option>
                <option>36–40 років</option>
                <option>41–45 років</option>
                <option>46–50 років</option>
                <option>Понад 50 років</option>
            </select>

            <select id="specialization" required>
                <option value="" disabled selected>Спеціалізація та статус</option>
                <option data-price="1500">Лікар сімейний лікар</option>
                <option data-price="1500">Лікар педіатр</option>
                <option data-price="1000">Інтерн сімейний лікар</option>
                <option data-price="1000">Інтерн педіатр</option>
                 </select>

                 <select id="blog" required>
                <option value="" disabled selected>Чи ведете ви професійний блог лікаря?</option>
                <option>Так, веду професійн блог</option>
                <option>Ні, веду свій блог</option>
                <option>Ні, не веду жоден блог</option>
            </select>

            <select id="source" required>
                <option value="" disabled selected>Звідки про нас дізналися?</option>
                <option>Instagram</option>
                <option>Telegram</option>
                <option>Email-розсилка</option>
                <option>Рекомендація колег</option>
                <option>Інше</option>
            </select>

             

            <button type="button" onclick="thirdStep()">Далі ➔</button>
            <button type="button" class="btn-back" onclick="firstStep()">Назад</button>
        </div>

        <div class="step" id="step3" style="display:none;">
            <h3>Фінал</h3>
             
           <div class="checkbox-group">
                <label>Учасник Клубу (знижка)?</label>
                <select id="club_member">
                    <option value="none">Ні</option>
                    <option value="pediatric">Так (Клуб педіатрів)</option>
                    <option value="family">Так (Клуб сімейних лікарів)</option>
                </select>
            </div>

           
            <div class="checkbox-line">
                <input type="checkbox" id="partners"> <label>Чи цікава вам інформація від наших партнерів (фармацевтичних компаній) щодо нових протоколів та препаратів?</label>
            </div>
            <div class="checkbox-line">
                <input type="checkbox" required> <label>Згода на обробку персональних даних</label>
            </div>
            <div class="checkbox-line">
                <input type="checkbox" required> <label>Згода на фото- та відеозйомку під час заходу та подальше використання матеріалів у соціальних мережах</label>
            </div>

            <textarea id="comments" placeholder="Побажання чи зауваження"></textarea>

            <script type="text/javascript" id="widget-wfp-script" src="https://secure.wayforpay.com/server/pay-widget.js?ref=button"></script> <script type="text/javascript">function runWfpWdgt(url){var wayforpay=new Wayforpay();wayforpay.invoice(url);}</script> <button type="button" onclick="runWfpWdgt('https://secure.wayforpay.com/button/b0e3c2fc1cf60');" style="display:inline-block!important;background:#0488cd;background-size:cover;width: 256px!important;height:54px!important;border:none!important;border-radius:14px!important;padding:16px!important;box-shadow:3px 2px 8px rgba(71,66,66,0.22)!important;text-align:center!important;outline:none!important;" onmouseover="this.style.opacity='0.8';" onmouseout="this.style.opacity='1';"> <span style="font-family:Verdana,Arial,sans-serif!important;font-weight:bold!important;font-size:14px!important;color:#ffffff!important;line-height:18px!important;vertical-align:middle!important;">Оплатити</span></button>

            <div class="price-display">До сплати: <span id="final-price">0</span> грн</div>
            <button type="submit" id="submit-btn">Зареєструватись і оплатити</button>
            <button type="button" class="btn-back" onclick="secondStep()">Назад</button>
        </div>
    </form>
</div>

<script src="script.js"></script>

</body>
</html>
